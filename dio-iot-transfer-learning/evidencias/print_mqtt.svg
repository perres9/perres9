<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#1a0b2e"/>
  <rect x="20" y="20" width="1160" height="520" rx="10" fill="#271240" stroke="#4c1d95"/>
  <text x="40" y="60" fill="#c4b5fd" font-family="Consolas, 'Courier New', monospace" font-size="26">MQTT Publisher + Subscriber (simulacao)</text>
  <text x="40" y="110" fill="#e9d5ff" font-family="Consolas, 'Courier New', monospace" font-size="21">Terminal 1 (publisher): python .\src\iot_publisher.py --image .\exemplos\foto.jpg --broker test.mosquitto.org --topic dio/iot/predictions</text>
  <text x="40" y="150" fill="#f5d0fe" font-family="Consolas, 'Courier New', monospace" font-size="21">Broker: test.mosquitto.org:1883</text>
  <text x="40" y="185" fill="#f5d0fe" font-family="Consolas, 'Courier New', monospace" font-size="21">Topico: dio/iot/predictions</text>
  <text x="40" y="220" fill="#f5d0fe" font-family="Consolas, 'Courier New', monospace" font-size="21">Payload publicado: {"prediction": "classe_1", "confidence": 0.9231, "source": "foto.jpg"}</text>
  <text x="40" y="290" fill="#ddd6fe" font-family="Consolas, 'Courier New', monospace" font-size="21">Terminal 2 (subscriber): mosquitto_sub -h test.mosquitto.org -t dio/iot/predictions</text>
  <text x="40" y="330" fill="#fde68a" font-family="Consolas, 'Courier New', monospace" font-size="22">{ "prediction": "classe_1", "confidence": 0.9231, "source": "foto.jpg" }</text>
  <text x="40" y="420" fill="#86efac" font-family="Consolas, 'Courier New', monospace" font-size="21">Mensagem recebida com sucesso no subscriber.</text>
  <text x="40" y="470" fill="#9ca3af" font-family="Consolas, 'Courier New', monospace" font-size="18">Arquivo ilustrativo para documentacao academica.</text>
</svg>
